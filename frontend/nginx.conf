server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed, immutable build assets: cache hard, but 404 if missing. They must
    # NEVER fall back to index.html — serving HTML as a JS module is what causes
    # "Failed to load module script ... MIME type text/html" after a redeploy.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend service. Body cap matches MAX_UPLOAD_MB so
    # large document uploads aren't rejected by nginx before reaching the API.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # SPA routes fall back to index.html. index.html must not be cached, so a new
    # deploy (with new asset hashes) is picked up on the next load instead of the
    # browser reusing a stale HTML that points at deleted asset files.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
